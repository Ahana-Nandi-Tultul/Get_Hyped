<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- website title -->
    <title>Get Hyped - Social-first Content Agency</title>
    <link rel="icon" type="image/png" href="./images/logo.svg">

    <!-- font awosome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind + daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./css/style.css">

</head>

<body>
    <div class="navbar">
        <div class="navbar-start">
            <div class="dropdown">
                <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                        stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h8m-8 6h16" />
                    </svg>
                </div>
                <ul tabindex="-1"
                    class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                    <li><a>Item 1</a></li>
                    <li>
                        <a>Parent</a>
                    </li>
                    <li><a>Item 3</a></li>
                </ul>
            </div>
            <a class="btn btn-ghost text-2xl w-30 h-20"><img src="navbar.png" alt="" class="w-full h-full"></a>
        </div>
        <div class="navbar-center hidden lg:flex">
            <ul class="menu menu-horizontal px-1 !bg-white text-black !py-1">
                <li><a class=" navli">Expertise</a></li>
                <li><a class="navli">Work</a></li>
                <li><a class="navli">About</a></li>
                <li><a class="navli">Contact</a></li>
            </ul>
        </div>
        <div class="navbar-end">
            <a class="btn navbtn flex justify-center items-center">Get Results <i class="fa-solid fa-fire 
                flex justify-center items-center px-2 py-1 rounded-sm text-orange-500"></i></a>
        </div>
    </div>
    <section class="mt-10 mb-5 px-4 md:px-10 lg:px-20">

        <h1 class="font-bold leading-tight text-2xl sm:text-3xl md:text-6xl lg:text-7xl xl:text-8xl">
            Get Hyped. Get <br class=" sm:block"> Noticed. Get Results.
        </h1>

        <h2 class="mt-5 font-bold text-base sm:text-lg md:text-xl lg:text-2xl max-w-2xl">
            Klaar met gokken op content<br class=" sm:block">
            die niets oplevert?
        </h2>
    </section>
    <section class="md:w-11/12 p-3 mx-auto">
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">

            <!-- CARD 1 -->
            <div class="card firstCard rounded-2xl h-80">
                <div class="p-4 flex flex-col h-full text-black">

                    <h2 class="text-3xl mb-25 sm:text-4xl md:text-6xl font-bold">
                        10M+
                    </h2>

                    <div class="card-actions border-b-2 border-black pb-1 mt-auto">
                        <h4 class="text-lg sm:text-xl font-bold">Organische views</h4>
                    </div>

                    <p class="mt-2 font-bold text-sm sm:text-base">
                        Groei door slimme content
                    </p>

                </div>
            </div>

            <!-- CARD 2 (IMAGE) -->
            <div class="card rounded-2xl overflow-hidden h-80">
                <img src="./images/card2.avif" class="w-full h-full object-cover" alt="card image" />
            </div>

            <!-- CARD 3 -->
            <div class="card thirdCard rounded-2xl h-80">
                <div class="p-4 flex flex-col h-full text-black">

                    <h2 class="text-3xl mb-25 sm:text-4xl md:text-6xl font-bold">
                        30+
                    </h2>

                    <div class="card-actions border-b-2 border-black pb-1 mt-auto">
                        <h4 class="text-lg sm:text-xl font-bold">Merken geholpen</h4>
                    </div>

                    <p class="mt-2 font-bold text-sm sm:text-base">
                        Van start-up tot multinational
                    </p>

                </div>
            </div>

            <!-- CARD 4 (IMAGE) -->
            <div class="card rounded-2xl overflow-hidden h-80">
                <img src="./images/card3.avif" class="w-full h-full object-cover" alt="card image" />
            </div>

        </div>
    </section>
    <script src="./script/script.js"></script>
</body>

</html>
